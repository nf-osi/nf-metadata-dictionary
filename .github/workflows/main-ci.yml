name: main-ci

on:

  pull_request:   # default types: opened, synchronize, reopened
    branches: [main]
    paths:
      - 'modules/**'
      - '.github/workflows/main-ci.yml'
      - 'utils/gen-json-schema-class.py'
      - 'tests/test_*.py'
      - 'tests/test_registry*.yaml'
      - 'tests/data/**'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal access token.
          fetch-depth: 0 # otherwise, there would be errors pushing refs to the destination repository

      - name: Get skip flags
        id: check_skip_flags
        run: echo "HEAD_COMMIT_MESSAGE=$(git show -s --format=%s)" >> "$GITHUB_OUTPUT"
      
      - name: Setup build tools and build artifacts
        shell: bash
        run: |
          pip install linkml==v1.8.1 synapseclient jsonref
          npm install -g json-dereference-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          make -B

      - name: Lint and validate LinkML dist artifact
        run: |
          echo "Linting dist/NF.yaml and validating against the LinkML metamodel"
          # --validate: check the schema against the LinkML metamodel (fails on structural errors).
          # --ignore-warnings: fail only on errors, not on the many pre-existing stylistic
          # warnings (naming conventions, canonical prefixes).
          linkml-lint --validate --ignore-warnings --format markdown --output linkml-lint-report.md dist/NF.yaml
          {
            echo "## LinkML lint report (dist/NF.yaml)";
            echo "";
            echo "<details><summary>Full report</summary>";
            echo "";
            cat linkml-lint-report.md;
            echo "";
            echo "</details>";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate and validate JSON schemas for all templates (classes)
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.DATA_MODEL_SERVICE }}
        run: |
          echo "Generating JSON schemas and validating them!"
          python utils/gen-json-schema-class.py
          make Superdataset

      - name: Report schema validation results as PR comment
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message-id: schema-validation-report
          message-path: |
            schema-validation-log.md
      
      - name: Check if artifacts changed
        id: check_artifacts
        run: |
          if [[ $(git diff --exit-code) ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Artifacts built successfully and have changes"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ Artifacts built successfully with no changes"
          fi

      - name: Report artifact build status as PR comment
        uses: mshick/add-pr-comment@v2
        with:
          message-id: artifact-build-report
          message: |
            ## ✅ Artifact Build Status

            All artifacts have been successfully built and validated from source modules.

            **Artifacts validated:**
            - `dist/NF.yaml` (LinkML YAML)
            - `dist/NF.ttl` (Turtle RDF)
            - `dist/NF.sssom.tsv` (SSSOM mapping set)
            - `registered-json-schemas/*.json` (Synapse JSON schemas)

            **Note:** Artifacts are not committed to this PR to avoid merge conflicts. All artifacts will be automatically rebuilt and committed to `main` after merge.

      - name: Upload artifacts for subsequent jobs
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/NF.yaml
            dist/NF.ttl
            dist/NF.sssom.tsv
            registered-json-schemas/*.json
          retention-days: 1

  analyze:
    name: Analyze data model changes
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10.12'

      - name: Install dependencies
        run: |
          pip install rdflib

      - name: Get main branch pre-built NF.ttl for comparison
        run: |
          git fetch origin main:main
          git checkout main -- dist/NF.ttl
          mv dist/NF.ttl dist/NF_main.ttl
          git checkout ${{ github.event.pull_request.head.ref }}

      - name: Download built NF.ttl from build job
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Run comparison analysis
        run: |
          python utils/compare.py > analysis_output.md

      - name: Post analysis as PR comment
        uses: mshick/add-pr-comment@v2
        with:
          message-id: data-model-analysis
          message-path: analysis_output.md

  docs-preview:
    name: Build and preview docs
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Download built artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: node build.mjs

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./docs

  pytest:
    name: pytest (schema instances + model integrity)
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10.12'

      - name: Download built artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install dependencies
        run: pip install pytest jsonschema pyyaml

      - name: Run pytest
        id: pytest
        run: |
          pytest tests/test_schema_instances.py tests/test_template_datatypes.py tests/test_model_system_sync.py -v \
            --tb=short 2>&1 | tee pytest_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Format pytest results as PR comment
        if: always()
        run: |
          EXIT_CODE="${{ steps.pytest.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "0" ]; then
            STATUS="✅ All tests passed"
          else
            STATUS="❌ Some tests failed"
          fi
          {
            echo "## $STATUS"
            echo ""
            echo '```'
            cat pytest_output.txt
            echo '```'
          } > pytest_report.md

      - name: Post pytest results as PR comment
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message-id: pytest-report
          message-path: pytest_report.md

  check-schema-limits:
    name: Validate schema limits (Synapse platform)
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download built artifacts from build job
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Check schema limits
        id: schema_check
        run: |
          # Run comprehensive schema validation
          # Exit codes: 0=pass, 1=critical failure, 2=warnings
          set +e  # Don't exit on error, we'll handle it
          python utils/check_schema_limits.py --output schema_limits_report.md --strict
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 1 ]; then
            echo "status=❌ FAILED - Critical limits exceeded" >> $GITHUB_OUTPUT
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "status=⚠️  WARNING - Some limits approaching" >> $GITHUB_OUTPUT
          else
            echo "status=✅ PASSED - All limits within safe bounds" >> $GITHUB_OUTPUT
          fi

      - name: Post schema limits report as PR comment
        uses: mshick/add-pr-comment@v2
        if: always()
        with:
          message-id: schema-limits-check
          message-path: schema_limits_report.md

