classes:
  AnimalIndividualTemplate:
    annotations:
      required: false
      requiresComponent: ''
      templateUsage: most_common
      dataGranularity: individual-level
    description: 'Template for non-human individual-level data. Use sex/age/species
      for the individual animal, and modelSystemName for the name of the mouse model.'
    slots:
    - individualID
    - sex
    - age
    - ageUnit
    - diagnosis
    - diagnosisAgeGroup
    - inheritance
    - mosaicism
    - nf1Genotype
    - nf2Genotype
    - germlineMutation
    - species
    - modelSystemName
  BiospecimenTemplate:
    annotations:
      required: false
      requiresComponent: ''
      templateUsage: most_common
      templateFor:
        dataType:
        - characteristic
      dataGranularity: specimen-level
    description: 'Specimen-level data, whether from human or animal. For cell line
      specimens, individualID references the cell line. For xenografts, also specify
      modelSystemName and model attributes.'
    slots:
    - individualID
    - parentSpecimenID
    - specimenID
    - aliquotID
    - tumorType
    - bodySite
    - experimentalCondition
    - modelSystemName
    - modelSpecies
    - modelSex
    - modelAge
    - modelAgeUnit
    rules:
    - description: If modelAge is provided, modelAgeUnit must be provided
      preconditions:
        slot_conditions:
          modelAge:
            value_presence: PRESENT
      postconditions:
        slot_conditions:
          modelAgeUnit:
            value_presence: PRESENT
  HumanCohortTemplate:
    annotations:
      required: false
      requiresComponent: ''
      templateUsage: most_common
      templateFor:
        dataType:
        - demographics
      dataGranularity: individual-level
    description: 'Data of biosamples from human patients. Adapted from Table 2 of
      http://nrs.harvard.edu/urn-3:HUL.InstRepos:32725809. This template should be
      used when biosamples are from NF patients to provides a more valuable characterization
      and make additional gene-phenotype insights possible.

      '
    notes:
    - Instead of collecting birth month/year, age is collected.
    - What has been required is still required, while all new recommendations are
      optional.
    - Include attributes used for the portal but not in recommendations (nf1Genotype,
      nf1Genotype, species).
    slots:
    - individualID
    - sex
    - age
    - ageUnit
    - diagnosis
    - diagnosisAgeGroup
    - inheritance
    - mosaicism
    - nf1Genotype
    - nf2Genotype
    - germlineMutationIndicator
    - species
    - vitalStatus
    - WHOPerformanceStatus
    - painStatus
    - tumorTreatmentStatus
    - cafeaulaitMacules
    - skinFoldFreckling
    - IrisLischNodules
    - dermalNeurofibromas
    - subcutaneousNodularNeurofibromas
    - diffuseDermalNeurofibromas
    - spinalNeurofibromas
    - plexiformNeurofibromas
    - opticGlioma
    - heartDefect
    - vascularDisease
    - pubertyOnset
    - stature
    - peripheralNeuropathy
    - aqueductalStenosis
    - longBoneDysplasia
    - sphenoidDysplasia
    - scoliosis
    - intellectualDisability
    - learningDisability
    - attentionDeficitDisorder
    - pheochromocytoma
    - glomusTumor
    - MPNSTCharacterization
    - nonopticGlioma
    - GIST
    - leukemia
    - breastCancer
    - otherTumors
    - vestibularSchwannoma
    - meningioma
    - gliomaOrEpendymoma
    - spinalSchwannoma
    - dermalSchwannoma
    - nonvestibularCranialSchwannoma
    - lenticularOpacity
    - nonvestibularSchwannomas
    - numberOfSchwannomas
    slot_usage:
      species:
        ifabsent: string(Homo sapiens)
    rules:
    - description: If age is provided and is not "Unknown", ageUnit must be provided
      preconditions:
        slot_conditions:
          age:
            value_presence: PRESENT
            none_of:
              - equals_string: Unknown
      postconditions:
        slot_conditions:
          ageUnit:
            value_presence: PRESENT
    - description: For Homo sapiens, age must be < 90; use the ">= 90" AgeMask value for ages at or above this threshold (HIPAA Safe Harbor)
      preconditions:
        slot_conditions:
          species:
            equals_string: Homo sapiens
      postconditions:
        slot_conditions:
          age:
            maximum_value: 89.99999
