classes:
  FileBasedTemplate:
    abstract: true
    description: 'Abstract template for metadata on file-based resources, i.e. data
      artifacts stored as files.'
    is_a: Template
    notes:
    - FileBasedTemplate and RecordBasedTemplate are not technically mutually exclusive;
      some resources may have both file and record representations.
    slots:
    - Component
    - Filename
    - fileFormat
    - resourceType

  RecordBasedTemplate:
    abstract: true
    description: 'Abstract template for metadata on record-based resources, i.e. structured
      records in a database or registry rather than file artifacts.'
    is_a: Template
    notes:
    - FileBasedTemplate and RecordBasedTemplate are not technically mutually exclusive;
      some resources may have both file and record representations.

  BiologicalAssayDataTemplate:
    abstract: true
    description: 'A template defining basic metadata on deposited data artifacts (i.e.
      files) from experimental assays involving biosamples. Donor/individual attributes
      (species, sex, age, diagnosis) describe the original donor (e.g., human patient
      tumor). For cell lines, individualID references syn51730943. antibodyID and
      geneticReagentID reference treatments/reagents. For PDX data, use PdxGenomicsAssayTemplate
      which includes model* attributes.'
    is_a: FileBasedTemplate
    slots:
    - dataType
    - dataSubtype
    - assay
    - individualID
    - species
    - sex
    - age
    - ageUnit
    - diagnosis
    - nf1Genotype
    - nf2Genotype
    - tumorType
    - organ
    - antibodyID
    - geneticReagentID
    - comments
    rules:
    - description: If age is provided and is not "Unknown", ageUnit must be provided
      preconditions:
        slot_conditions:
          age:
            value_presence: PRESENT
            none_of:
            - equals_string: Unknown
      postconditions:
        slot_conditions:
          ageUnit:
            value_presence: PRESENT
    - description: For Homo sapiens, age must be < 90; use the ">= 90" AgeMask value
        for ages at or above this threshold (HIPAA Safe Harbor)
      preconditions:
        slot_conditions:
          species:
            equals_string: Homo sapiens
      postconditions:
        slot_conditions:
          age:
            maximum_value: 89.99999
    - description: If dataType is provided, dataSubtype must be provided
      preconditions:
        slot_conditions:
          dataType:
            value_presence: PRESENT
      postconditions:
        slot_conditions:
          dataSubtype:
            value_presence: PRESENT
    - description: 'Relaxed conditional validation (issue #825): the listed fields
        are required only for experimentalData. Auxiliary co-located files (manifest,
        metadata, report, workflow report, tool, result, weblink, protocol) are exempt.'
      preconditions:
        slot_conditions:
          resourceType:
            equals_string: experimentalData
      postconditions:
        slot_conditions:
          dataType:
            value_presence: PRESENT
          dataSubtype:
            value_presence: PRESENT
          assay:
            value_presence: PRESENT
          individualID:
            value_presence: PRESENT
          species:
            value_presence: PRESENT
          diagnosis:
            value_presence: PRESENT
          tumorType:
            value_presence: PRESENT
    annotations:
      dataGranularity: specimen-level

    slot_usage:
      dataType:
        required: false
      dataSubtype:
        required: false
      assay:
        required: false
      individualID:
        required: false
      species:
        required: false
      diagnosis:
        required: false
      tumorType:
        required: false
  NonBiologicalAssayDataTemplate:
    abstract: true
    description: 'Describes data artifacts (i.e. files) from an experimental/physical-sciences
      assay  where input specimens are more at the level of synthesized molecules
      or inorganic materials.

      '
    is_a: FileBasedTemplate
    notes:
    - Name of this base abstraction is not great, may need to revise.
    slots:
    - dataType
    - dataSubtype
    - assay
    annotations:
      dataGranularity: specimen-level
    slot_usage:
      dataType:
        required: false
      dataSubtype:
        required: false
      assay:
        required: false
    rules:
    - description: 'Relaxed conditional validation (issue #825): the listed fields
        are required only for experimentalData. Auxiliary co-located files (manifest,
        metadata, report, workflow report, tool, result, weblink, protocol) are exempt.'
      preconditions:
        slot_conditions:
          resourceType:
            equals_string: experimentalData
      postconditions:
        slot_conditions:
          dataType:
            value_presence: PRESENT
          dataSubtype:
            value_presence: PRESENT
          assay:
            value_presence: PRESENT
