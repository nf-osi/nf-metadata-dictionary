classes:
  CellTissuePhenotypingTemplate:
    annotations:
      dataGranularity: specimen-level
      required: false
      requiresComponent: ''
      templateFor:
        assay:
        - cell competition
        - cell count
        - cell proliferation
        - cell viability assay
        - complex II enzyme activity assay
        - BrdU proliferation assay
        - electrochemiluminescence
        - focus forming assay
        - in vivo tumor growth
        - in vitro tumorigenesis
        dataType:
        - physiology parameter
        - morphology parameter
        - volume
        - weight
      templateUsage: common
    description: Data that characterizes cell/tissue morphology or physiology often in the context of different experimental conditions
    is_a: BiologicalAssayDataTemplate
    rules:
    - description: If experimentalTimepoint is provided, timepointUnit must be provided
      postconditions:
        slot_conditions:
          timepointUnit:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          experimentalTimepoint:
            value_presence: PRESENT
    - description: If compoundDose is provided, compoundDoseUnit must be provided
      postconditions:
        slot_conditions:
          compoundDoseUnit:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          compoundDose:
            value_presence: PRESENT
    - description: If genePerturbed is provided, genePerturbationType must be provided
      postconditions:
        slot_conditions:
          genePerturbationType:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          genePerturbed:
            value_presence: PRESENT
    - description: If genePerturbed is provided, genePerturbationTechnology must be provided
      postconditions:
        slot_conditions:
          genePerturbationTechnology:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          genePerturbed:
            value_presence: PRESENT
    - description: If aliquotID is provided, specimenID must be provided
      postconditions:
        slot_conditions:
          specimenID:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          aliquotID:
            value_presence: PRESENT
    - description: If parentSpecimenID is provided, specimenID must be provided
      postconditions:
        slot_conditions:
          specimenID:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          parentSpecimenID:
            value_presence: PRESENT
    slots:
    - parentSpecimenID
    - specimenID
    - aliquotID
    - modelSystemName
    - experimentalFactor
    - experimentalCondition
    - experimentalTimepoint
    - timepointUnit
    - compoundName
    - compoundDose
    - compoundDoseUnit
    - genePerturbed
    - genePerturbationType
    - genePerturbationTechnology
    - comments
  ElectrophysiologyAssayTemplate:
    annotations:
      dataGranularity: specimen-level
      templateFor:
        assay:
        - local field potential recording
        - long term potentiation assay
        - multi-electrode array
        - pattern electroretinogram
        - whole-cell patch clamp
        dataType:
        - electrophysiology
      templateUsage: common
    description: Template for raw electrophysiology data (electrical recordings).
    is_a: BiologicalAssayDataTemplate
    rules:
    - description: If experimentalTimepoint is provided, timepointUnit must be provided
      postconditions:
        slot_conditions:
          timepointUnit:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          experimentalTimepoint:
            value_presence: PRESENT
    slot_usage:
      assay:
        range: CellBasedAssayEnum
      fileFormat:
        any_of:
        - range: OtherFileFormatEnum
        - range: TabularFileFormatEnum
    slots:
    - platform
    - bodySite
    - cellType
    - recordingSource
    - experimentalTimepoint
    - timepointUnit
    - experimentalCondition
    - auxiliaryAsset
    source: https://arxiv.org/pdf/1605.07673.pdf
  FlowCytometryTemplate:
    annotations:
      dataGranularity: specimen-level
      required: false
      requiresComponent: ''
      templateFor:
        assay:
        - flow cytometry
        dataType:
        - immunoassay
      templateUsage: common
    close_mappings:
    - https://www.immport.org/shared/dataModelDocumentation?table=fcs_analyzed_result
    description: Template for flow cytometry assay
    is_a: BiologicalAssayDataTemplate
    slot_usage:
      assay:
        ifabsent: string(flow cytometry)
        range: CellBasedAssayEnum
      fileFormat:
        range: OtherFileFormatEnum
      platform:
        range: FlowCytometryPlatformEnum
    slots:
    - platform
    - cellType
    - auxiliaryAsset
  PlateBasedReporterAssayTemplate:
    annotations:
      dataGranularity: specimen-level
      required: false
      requiresComponent: ''
      templateFor:
        assay:
        - 2D AlamarBlue absorbance
        - 2D AlamarBlue fluorescence
        - cell viability assay
        - combination library screen
        - combination screen
        - compound screen
        - ELISA
        - sandwich ELISA
        dataType:
        - drug screen
        - drug combination screen
        - pharmacokinetics
      templateUsage: most_common
    description: Generic template for describing data from a plate-based reporter assay.
    is_a: BiologicalAssayDataTemplate
    rules:
    - description: If experimentalTimepoint is provided, timepointUnit must be provided
      postconditions:
        slot_conditions:
          timepointUnit:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          experimentalTimepoint:
            value_presence: PRESENT
    - description: If compoundDose is provided, compoundDoseUnit must be provided
      postconditions:
        slot_conditions:
          compoundDoseUnit:
            value_presence: PRESENT
      preconditions:
        slot_conditions:
          compoundDose:
            value_presence: PRESENT
    slot_usage:
      assay:
        range: CellBasedAssayEnum
      compoundDose:
        required: true
      compoundDoseUnit:
        required: true
      compoundName:
        required: true
      fileFormat:
        range: TabularFileFormatEnum
      individualID:
        required: false
      platform:
        range: PlateReaderPlatformEnum
        required: false
    slots:
    - parentSpecimenID
    - specimenID
    - aliquotID
    - platform
    - assayTarget
    - compoundName
    - compoundDose
    - compoundDoseUnit
    - experimentalCondition
    - experimentalTimepoint
    - timepointUnit
    - reporterGene
    - reporterSubstance
