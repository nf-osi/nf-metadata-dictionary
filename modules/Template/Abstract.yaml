classes:
  PartialTemplate:
    abstract: true
    description: A template for collecting a subset of contextual data; not intended
      to be a standalone template but rather a subdocument.
  RecordSet:
    abstract: true
    description: A set of individual-level records, where each row represents one subject or observation.
    source: https://rest-docs.synapse.org/rest/org/sagebionetworks/repo/model/RecordSet.html
  Template:
    abstract: true
    comments:
    - Also called a manifest depending on context.
    description: A collection of fields representing some entity.
  
