classes:
  SpatialTranscriptomicsImagingTemplate:
    annotations:
      dataGranularity: specimen-level
      required: false
      requiresComponent: ''
      templateFor:
        assay:
        - spatial transcriptomics
        dataType:
        - image
      templateUsage: most_common
    description: Template for describing imaging data files from spatial transcriptomics experiments, such as tissue section histology or fluorescence images (e.g., from 10x Visium, NanoString CosMx, GeoMx).
    is_a: ImagingAssayTemplate
    slot_usage:
      assay:
        ifabsent: string(spatial transcriptomics)
        range: ImagingAssayEnum
      dataType:
        ifabsent: string(image)
      fileFormat:
        range: ImagingFileFormatEnum
      platform:
        range: ImagingSystemPlatformEnum
    slots:
    - parentSpecimenID
    - specimenID
    - aliquotID
    - captureArea
    - visiumslideID
    - cytassistSample
    - specimenType
  SpatialTranscriptomicsSequencingTemplate:
    annotations:
      dataGranularity: specimen-level
      required: false
      requiresComponent: ''
      templateFor:
        assay:
        - spatial transcriptomics
        dataType:
        - gene expression
      templateUsage: most_common
    close_mappings:
    - htan:VisiumSpatialTranscriptomicsLevel1
    description: Template for describing sequencing-based and expression data files from spatial transcriptomics experiments (e.g., FASTQ files and count matrices from 10x Visium, 10x Visium CytAssist, NanoString CosMx, GeoMx).
    is_a: GeneticsAssayTemplate
    slot_usage:
      assay:
        ifabsent: string(spatial transcriptomics)
        range: SequencingAssayEnum
      dataType:
        ifabsent: string(gene expression)
      fileFormat:
        range: SequencingFileFormatEnum
      platform:
        any_of:
        - range: SequencingPlatformEnum
    slots:
    - captureArea
    - visiumslideID
    - cytassistSample
    - probeSet
    - libraryPrep
    - libraryPreparationMethod
    - specimenType
