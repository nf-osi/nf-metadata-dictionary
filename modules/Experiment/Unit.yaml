enums:
  BooleanEnum:
    description: Boolean data as Yes/No enums
    permissible_values:
      'No':
        description: 'False'
      'Yes':
        description: 'True'
  ConcentrationUnit:
    permissible_values:
      mM:
        description: ''
      mg/mL:
        description: ''
      particles/mL:
        description: ''
  ExpressionUnitEnum:
    description: Quantification units for gene expression.
    permissible_values:
      CPM:
        description: Counts per million mapped reads, a simple normalization for sequencing depth.
      Counts:
        description: Either raw read counts or normalized counts (use the more specific term if possible).
      Ct:
        aliases:
        - Cq
        - cycle threshold
        description: Cycle threshold (Ct) value from quantitative PCR, representing the cycle number at which fluorescence signal crosses a defined threshold.
      FPKM:
        description: Fragments per kilobase of transcript per miilion reads mapped
      Normalized Counts:
        description: Normalized counts based on some normalization method (e.g. DESeq2).
      Other:
      RPKM:
        description: Reads per kilobase of transcript per million reads mapped
      Raw Counts:
        description: Raw read counts of transcripts.
      TPM:
        description: Transcript per million
      delta Ct:
        aliases:
        - ΔCt
        description: Relative cycle threshold value normalized to a reference gene (target Ct minus reference Ct).
      delta delta Ct:
        aliases:
        - ΔΔCt
        description: Fold change in expression relative to a control condition, calculated as the difference between sample delta Ct and control delta Ct.
      fluorescence intensity:
        description: Fluorescence signal intensity, typically from microarray or imaging-based expression assays.
  TimeUnit:
    permissible_values:
      days:
        meaning: UO:0000033
      hours:
        aliases:
        - h
        meaning: UO:0000032
      minutes:
        aliases:
        - min
        meaning: UO:0000031
      months:
        meaning: UO:0000035
      seconds:
        aliases:
        - s
        meaning: UO:0000010
      weeks:
        meaning: UO:0000034
      years:
        meaning: UO:0000036
